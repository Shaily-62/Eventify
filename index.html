<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventify | Smart Event Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <div class="min-h-screen flex flex-col">
    <header class="bg-white/90 dark:bg-slate-900/90 border-b border-slate-200 dark:border-slate-800">
      <div class="max-w-6xl mx-auto px-4 py-5 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div>
          <p class="text-sm uppercase tracking-[0.3em] text-sky-600 dark:text-sky-400 font-semibold">Eventify</p>
          <h1 class="mt-2 text-3xl font-bold">Smart Event Planner</h1>
          <p class="mt-1 text-slate-600 dark:text-slate-400 max-w-xl">Create events, view details, edit, delete, RSVP, and save everything in your browser.</p>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <a href="create.html" class="inline-flex items-center justify-center rounded-lg bg-sky-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-sky-500">Create Event</a>
        </div>
      </div>
    </header>

    <main class="flex-1 max-w-6xl mx-auto px-4 py-8">
      <section class="mb-8">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
          <div>
            <h2 class="text-2xl font-semibold">Upcoming events</h2>
            <p class="mt-1 text-slate-600 dark:text-slate-400">All your events are stored locally and remain after refresh.</p>
          </div>
          <div class="rounded-2xl bg-slate-100/90 p-3 text-sm text-slate-700 dark:bg-slate-800/90 dark:text-slate-200">
            <span id="eventCount">0 events</span>
          </div>
        </div>
      </section>

      <div id="eventList" class="grid gap-6"></div>
    </main>

    <footer class="bg-white/90 dark:bg-slate-900/90 border-t border-slate-200 dark:border-slate-800">
      <div class="max-w-6xl mx-auto px-4 py-4 text-sm text-slate-500 dark:text-slate-400">Eventify - Smart Event Planner &copy; 2026</div>
    </footer>
  </div>

  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/eventList.js"></script>
</body>
</html>
